<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather-Forecasting</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/791987f3c6.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- *****************container 1************ -->
    <div class="content">
      <div class="container">
        <div class="header">
          <div class="search-bar">
            <input
              class="search-text"
              type="text"
              placeholder="enter the city."
            />
          </div>
          <div class="search-icon">
            <img class="search-button" src="images/search.png"  />
          </div>
        </div>
      </div>
      <!-- *****************container 2************ -->
      <div class="container">
        <div class="city-name"><h2 class="city">Default ( )</h2></div>
      </div>
      <!-- *****************container 3************ -->
      <div class="container">
        <div class="current">
          <div class="weather">
            <div class="weather-image">
              <img class="current-weather-image" src="images/mist.png" />
            </div>
            <div class="weather-type">
              <h1 class="current-weather">Haze</h1>
            </div>
          </div>
          <div class="today-parameters">
            <div class="temp">
              <h1 class="current-temp">27°c</h1>
            </div>
            <div class="parameters">
              <p class="wind">Wind: 10 km/hr</p>
              <p class="pressure">Pressure: 1000 mb</p>
              <p class="humidity">Humidity: 50 %</p>
            </div>
          </div>
        </div>
      </div>
      <!-- *****************container 4************ -->

      <div class="container">
        <div class="forecast">
          <div class="all-card">
            <div class="card">
              <div class="card-day"><h2 class="day1">Mon</h2></div>
              <div class="card-image">
                <img class="day1-image" src="images/mist.png" />
              </div>
              <div class="card-temp"><h2 class="day1-temp">27°c</h2></div>
            </div>
            <div class="card">
              <div class="card-day"><h2 class="day2">Tue</h2></div>
              <div class="card-image">
                <img class="day2-image" src="images/mist.png" />
              </div>
              <div class="card-temp"><h2 class="day2-temp">27°c</h2></div>
            </div>
            <div class="card">
              <div class="card-day"><h2 class="day3">Wed</h2></div>
              <div class="card-image">
                <img class="day3-image" src="images/mist.png" />
              </div>
              <div class="card-temp"><h2 class="day3-temp">27°c</h2></div>
            </div>
            <div class="card">
              <div class="card-day"><h2 class="day4">Thu</h2></div>
              <div class="card-image">
                <img class="day4-image" src="images/mist.png" />
              </div>
              <div class="card-temp"><h2 class="day4-temp">27°c</h2></div>
            </div>
            <div class="card">
              <div class="card-day"><h2 class="day5">Fri</h2></div>
              <div class="card-image">
                <img class="day5-image" src="images/mist.png" />
              </div>
              <div class="card-temp"><h2 class="day5-temp">27°c</h2></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="index1.js"></script>
  </body>
</html>
